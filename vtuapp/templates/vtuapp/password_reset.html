{% load widget_tweaks %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Datasub - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        .neon-cyan { box-shadow: 0 0 25px #22d3ee; }
        input { color: white !important; }
    </style>
</head>
<body class="bg-[#0a0a2e] text-white min-h-screen flex items-center justify-center py-8">
    <div class="max-w-md w-full px-4">
        <div class="bg-[#12123a] border border-cyan-400 rounded-3xl p-8 neon-cyan">
            <h1 class="text-3xl font-bold mb-2">Reset Password</h1>
            <p class="text-cyan-300 mb-8">Enter your email to receive a reset link.</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                    <input type="email" name="email" required
                           class="w-full bg-[#1a1a4a] border border-purple-500/50 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30 rounded-3xl px-6 py-5 text-white placeholder-gray-400 outline-none transition-all">
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 py-6 rounded-3xl text-lg font-semibold transition-all">
                    SEND RESET LINK
                </button>
            </form>
                <div class="mt-6 text-center">
                 <p class="text-gray-400 text-sm">
                    Remembered it? 
                    <a href="{% url 'login' %}" class="text-cyan-400 hover:underline">Back to Login</a>
                </p>
            </div>
                        
            <div class="mt-6 text-center">
                <a href="{% url 'login' %}" class="text-gray-400 hover:text-white text-sm">Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
