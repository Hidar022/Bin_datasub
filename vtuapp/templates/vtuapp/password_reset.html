{% extends 'vtuapp/base.html' %}
{% load widget_tweaks %}

{% block title %}Reset Password - Bin Datasub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="bg-white dark:bg-[#12123a] border border-gray-200 dark:border-cyan-400 rounded-3xl p-8 shadow-xl dark:neon-cyan">
            <h1 class="text-3xl font-bold mb-2 text-gray-900 dark:text-white">Reset Password</h1>
            <p class="text-gray-600 dark:text-cyan-300 mb-8">Enter your email to receive a reset link.</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email Address</label>
                    <input type="email" name="email" required
                           class="w-full bg-gray-50 dark:bg-[#1a1a4a] border border-gray-300 dark:border-purple-500/50 focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30 rounded-3xl px-6 py-5 text-gray-900 dark:text-white placeholder-gray-400 outline-none transition-all">
                </div>

                <button type="submit" 
                        class="w-full bg-gradient-to-r from-blue-500 to-cyan-400 hover:from-blue-600 hover:to-cyan-500 py-6 rounded-3xl text-lg font-semibold text-white transition-all shadow-lg">
                    SEND RESET LINK
                </button>
            </form>

            <div class="mt-8 text-center border-t border-gray-100 dark:border-gray-800 pt-6">
                <p class="text-gray-600 dark:text-gray-400 text-sm">
                    Remembered it? 
                    <a href="{% url 'login' %}" class="text-cyan-500 dark:text-cyan-400 font-bold hover:underline">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
