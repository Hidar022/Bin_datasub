{% extends 'vtuapp/base.html' %}

{% block title %}Email Sent - Bin Datasub{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-white dark:bg-[#12123a] border border-gray-200 dark:border-cyan-400 rounded-3xl p-8 shadow-xl dark:neon-cyan">
            <div class="text-6xl text-cyan-500 dark:text-cyan-400 mb-6">
                <i class="fas fa-paper-plane animate-bounce"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4 text-gray-900 dark:text-white">Check Your Email</h1>
            <p class="text-gray-600 dark:text-gray-400 mb-8">We've sent instructions to reset your password. If it doesn't arrive soon, check your spam folder.</p>
            
            <a href="{% url 'login' %}" 
               class="block w-full bg-gray-100 dark:bg-[#1a1a4a] border border-gray-200 dark:border-cyan-400/50 hover:bg-cyan-500 hover:text-white py-4 rounded-3xl font-semibold transition-all">
                RETURN TO LOGIN
            </a>
        </div>
    </div>
</div>
{% endblock %}
