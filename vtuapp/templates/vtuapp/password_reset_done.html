<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bin Datasub - Email Sent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        .neon-cyan { box-shadow: 0 0 25px #22d3ee; }
    </style>
</head>
<body class="bg-[#0a0a2e] text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full text-center">
        <div class="bg-[#12123a] border border-cyan-400 rounded-3xl p-8 neon-cyan">
            <div class="text-6xl text-cyan-400 mb-6">
                <i class="fas fa-paper-plane animate-bounce"></i>
            </div>
            <h1 class="text-3xl font-bold mb-4">Check Your Email</h1>
            <p class="text-gray-400 mb-8">We've sent instructions to reset your password. If it doesn't arrive soon, check your spam folder.</p>
            
            <a href="{% url 'login' %}" 
               class="block w-full bg-[#1a1a4a] border border-cyan-400/50 hover:bg-cyan-400 hover:text-[#0a0a2e] py-4 rounded-3xl font-semibold transition-all">
                RETURN TO LOGIN
            </a>
        </div>
    </div>
</body>
</html>
