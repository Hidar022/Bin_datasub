{% extends 'vtuapp/base.html' %}
{% load widget_tweaks %}

{% block title %}Verify OTP - Bin Datasub{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] py-12 transition-colors duration-300">
    <div class="max-w-md w-full mx-4">

        <!-- Logo -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl font-bold">
                    📡
                </div>
                <span class="text-4xl font-bold tracking-tighter text-gray-900 dark:text-white">
                    Bin Datasub
                </span>
            </div>
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-[#12123a] border border-gray-200 dark:border-purple-500/50 rounded-3xl p-8 shadow-xl transition-all">

            <h1 class="text-3xl font-bold text-center mb-2 text-gray-900 dark:text-white">
                Verify Your Email
            </h1>

            <p class="text-gray-600 dark:text-cyan-300 text-center mb-8">
                Enter the 6-digit code sent to your email
            </p>

            <!-- Messages -->
            <div id="messages-container" class="space-y-3 mb-6"></div>

            <!-- Form -->
            <form id="otpForm" method="POST" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-300 mb-2 text-center">
                        Verification Code
                    </label>

                    <input type="text" name="otp" id="otpInput" maxlength="6"
                        class="w-full bg-gray-50 dark:bg-[#1a1a4a] border border-gray-300 dark:border-purple-500/50 focus:border-cyan-400 rounded-3xl px-6 py-5 text-center text-3xl tracking-[12px] text-gray-900 dark:text-white outline-none transition-all"
                        placeholder="123456" autocomplete="off" required>
                </div>

                <button type="submit" id="verifyBtn"
                    class="w-full bg-gradient-to-r from-purple-500 to-cyan-400 hover:from-purple-600 hover:to-cyan-500 py-5 rounded-3xl font-bold text-white text-lg flex items-center justify-center gap-3 transition-all active:scale-95">

                    <span id="btnText">VERIFY EMAIL</span>
                    <i id="btnSpinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <!-- Resend -->
            <div class="mt-8 text-center text-sm text-gray-500 dark:text-gray-400">
                Didn't receive the code?
                <button onclick="window.location.reload()"
                    class="text-purple-600 dark:text-cyan-400 hover:underline font-bold">
                    Resend OTP
                </button>
            </div>

        </div>

        <!-- Back -->
        <div class="mt-8 text-center">
            <a href="{% url 'login' %}"
               class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white text-sm">
                <i class="fas fa-arrow-left mr-2"></i>Back to Login
            </a>
        </div>

    </div>
</div>

<!-- JS -->
<script>
const form = document.getElementById('otpForm');
const btn = document.getElementById('verifyBtn');
const btnText = document.getElementById('btnText');
const btnSpinner = document.getElementById('btnSpinner');
const messagesContainer = document.getElementById('messages-container');
const otpInput = document.getElementById('otpInput');

function showMessage(message, type = 'error') {
    const div = document.createElement('div');

    div.className = `px-5 py-4 rounded-2xl text-sm flex items-center gap-3 border-l-4 ${
        type === 'success'
            ? 'bg-emerald-500/10 border-emerald-500 text-emerald-600 dark:text-emerald-300'
            : 'bg-red-500/10 border-red-500 text-red-600 dark:text-red-300'
    }`;

    div.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
        <span>${message}</span>
    `;

    messagesContainer.innerHTML = '';
    messagesContainer.appendChild(div);
}

form.addEventListener('submit', async function(e) {
    e.preventDefault();

    btn.disabled = true;
    btnText.classList.add('opacity-0');
    btnSpinner.classList.remove('hidden');

    const formData = new FormData(form);

    try {
        const response = await fetch('/verify-otp/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });

        const data = await response.json();

        if (response.ok && data.success) {
            showMessage(data.message, 'success');

            setTimeout(() => {
                window.location.href = data.redirect_url || "{% url 'dashboard' %}";
            }, 1200);

        } else {
            showMessage(data.message || 'Verification failed. Try again.');

            btn.disabled = false;
            btnText.classList.remove('opacity-0');
            btnSpinner.classList.add('hidden');
        }

    } catch (err) {
        showMessage('Network error. Check your internet.');

        btn.disabled = false;
        btnText.classList.remove('opacity-0');
        btnSpinner.classList.add('hidden');
    }
});

// auto focus
window.onload = () => otpInput.focus();
</script>
{% endblock %}
