{% load widget_tweaks %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Bin Datasub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        .neon-glow { box-shadow: 0 0 25px #a855f7, 0 0 40px #a855f7; }
        .neon-text { text-shadow: 0 0 15px #22d3ee; }
        input { color: white !important; }
        input::placeholder { color: #9ca3af !important; }
    </style>
</head>
<body class="bg-[#0a0a2e] text-white min-h-screen flex items-center justify-center py-12">
    <div class="max-w-md w-full mx-4">
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl font-bold">📡</div>
                <span class="text-4xl font-bold tracking-tighter neon-text">Bin Datasub</span>
            </div>
        </div>

        <div class="bg-[#12123a] border border-purple-500/50 rounded-3xl p-8 neon-glow">
            <h1 class="text-3xl font-bold text-center mb-2">Verify Your Email</h1>
            <p class="text-cyan-300 text-center mb-8">Enter the 6-digit code sent to your email</p>

            <div id="messages-container" class="space-y-3 mb-6"></div>

            <form id="otpForm" method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Verification Code</label>
                    <input type="text" name="otp" id="otpInput" maxlength="6" 
                           class="w-full bg-[#1a1a4a] border border-purple-500/50 focus:border-cyan-400 rounded-3xl px-6 py-5 text-white placeholder-gray-400 text-3xl tracking-[12px] text-center outline-none transition-all"
                           placeholder="123456" required autocomplete="off">
                </div>

                <button type="submit" id="verifyBtn"
                        class="w-full bg-gradient-to-r from-purple-500 to-cyan-400 hover:from-purple-600 hover:to-cyan-500 py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 transition-all">
                    <span id="btnText">VERIFY EMAIL</span>
                    <i id="btnSpinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-400">
                Didn't receive the code? 
                <button onclick="window.location.reload()" class="text-cyan-400 hover:text-white font-medium">Resend</button>
            </div>
        </div>
    </div>

<script>
    const form = document.getElementById('otpForm');
    const btn = document.getElementById('verifyBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const messagesContainer = document.getElementById('messages-container');

    function showMessage(message, type = 'error') {
        const div = document.createElement('div');
        div.className = `p-4 rounded-2xl text-sm font-medium flex items-center gap-3 ${
            type === 'success' 
                ? 'bg-green-500/20 border border-green-500 text-green-300' 
                : 'bg-red-500/20 border border-red-500 text-red-300'
        }`;
        div.innerHTML = `
            <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
            <span>${message}</span>
        `;
        messagesContainer.appendChild(div);

        setTimeout(() => {
            div.style.transition = 'opacity 0.4s';
            div.style.opacity = '0';
            setTimeout(() => div.remove(), 400);
        }, 5000);
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        messagesContainer.innerHTML = '';

        btn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');

        const formData = new FormData(form);

        try {
            const response = await fetch('/verify-otp/', {   // ← Hardcode the URL for safety
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                    // Do NOT set Content-Type — browser will set it correctly with FormData
                }
            });

            const data = await response.json();

            if (response.ok && data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => {
                    window.location.href = "{% url 'dashboard' %}";
                }, 1800);
            } else {
                showMessage(data.message || 'Invalid OTP. Please try again.');
            }
        } catch (err) {
            console.error(err);
            showMessage('Network error. Please check your connection and try again.');
        } finally {
            btn.disabled = false;
            btnText.classList.remove('hidden');
            btnSpinner.classList.add('hidden');
        }
    });
</script>
</body>
</html>
