{% extends 'vtuapp/base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] py-12">
    <div class="max-w-md w-full mx-4">
        <!-- Logo Section -->
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl font-bold">📡</div>
                <span class="text-4xl font-bold tracking-tighter neon-text">Bin Datasub</span>
            </div>
        </div>

        <!-- Card Section -->
        <div class="bg-[#12123a] border border-purple-500/50 rounded-3xl p-8 neon-glow">
            <h1 class="text-3xl font-bold text-center mb-2">Verify Your Email</h1>
            <p class="text-cyan-300 text-center mb-8">Enter the 6-digit code sent to your email</p>

            <div id="messages-container" class="space-y-3 mb-6"></div>

            <form id="otpForm" method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Verification Code</label>
                    <input type="text" name="otp" id="otpInput" maxlength="6" 
                           class="w-full bg-[#1a1a4a] border border-purple-500/50 focus:border-cyan-400 rounded-3xl px-6 py-5 text-white placeholder-gray-400 text-3xl tracking-[12px] text-center outline-none transition-all"
                           placeholder="123456" required autocomplete="off">
                </div>

                <button type="submit" id="verifyBtn"
                        class="w-full bg-gradient-to-r from-purple-500 to-cyan-400 hover:from-purple-600 hover:to-cyan-500 py-5 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 transition-all">
                    <span id="btnText">VERIFY EMAIL</span>
                    <i id="btnSpinner" class="fas fa-spinner fa-spin hidden"></i>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-400">
                Didn't receive the code? 
                <button onclick="window.location.reload()" class="text-cyan-400 hover:text-white font-medium">Resend</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Keep your same script here, it's perfect as is!
    const form = document.getElementById('otpForm');
    const btn = document.getElementById('verifyBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    const messagesContainer = document.getElementById('messages-container');

    function showMessage(message, type = 'error') {
        const div = document.createElement('div');
        div.className = `p-4 rounded-2xl text-sm font-medium flex items-center gap-3 ${
            type === 'success' 
                ? 'bg-green-500/20 border border-green-500 text-green-300' 
                : 'bg-red-500/20 border border-red-500 text-red-300'
        }`;
        div.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i><span>${message}</span>`;
        messagesContainer.appendChild(div);
        setTimeout(() => { div.remove(); }, 5000);
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        btn.disabled = true;
        btnText.classList.add('hidden');
        btnSpinner.classList.remove('hidden');
        const formData = new FormData(form);

        try {
            const response = await fetch('/verify-otp/', { method: 'POST', body: formData, headers: {'X-Requested-With': 'XMLHttpRequest'}});
            const data = await response.json();
            if (response.ok && data.success) {
                showMessage(data.message, 'success');
                setTimeout(() => { window.location.href = "{% url 'dashboard' %}"; }, 1800);
            } else {
                showMessage(data.message || 'Invalid OTP.');
            }
        } catch (err) {
            showMessage('Network error.');
        } finally {
            btn.disabled = false;
            btnText.classList.remove('hidden');
            btnSpinner.classList.add('hidden');
        }
    });
</script>
{% endblock %}
